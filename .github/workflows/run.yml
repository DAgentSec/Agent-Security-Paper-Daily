name: agent-security-paper-daily

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync

    # ------------------------------------------------------------------ #
    #  Static site: inject config values and publish to main (always run) #
    # ------------------------------------------------------------------ #

    - name: Inject repository info and password hash into static files
      run: |
        REPO_OWNER="${{ github.repository_owner }}"
        REPO_NAME="${{ github.event.repository.name }}"

        PASSWORD="${{ secrets.ACCESS_PASSWORD }}"
        if [ -z "$PASSWORD" ]; then
          PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
        else
          PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
        fi

        sed -i "s/PLACEHOLDER_REPO_OWNER/${REPO_OWNER}/g" js/data-config.js
        sed -i "s/PLACEHOLDER_REPO_NAME/${REPO_NAME}/g"   js/data-config.js

        sed -i "s/PLACEHOLDER_REPO_OWNER/${REPO_OWNER}/g" index.html
        sed -i "s/PLACEHOLDER_REPO_NAME/${REPO_NAME}/g"   index.html

        sed -i "s/PLACEHOLDER_PASSWORD_HASH/${PASSWORD_HASH}/" js/auth-config.js

    - name: Commit and push static site to main
      run: |
        git config user.email "${{ vars.EMAIL }}"
        git config user.name  "${{ vars.NAME }}"

        git add index.html js/data-config.js js/auth-config.js .nojekyll _config.yml
        git add css/ js/ assets/logo.png 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "No static file changes to commit"
        else
          git commit -m "chore: update static site config"
          git config pull.rebase true
          git config rebase.autoStash true
          for i in {1..3}; do
            git push origin main && break || { git pull origin main --no-edit || true; [ $i -eq 3 ] && exit 1; }
          done
        fi

    # ------------------------------------------------------------------ #
    #  Data pipeline: tickets → crawl → dedup → AI → Markdown → data branch
    # ------------------------------------------------------------------ #

    - name: Process pending tickets
      id: tickets_step
      run: |
        source .venv/bin/activate
        today=$(date -u "+%Y-%m-%d")
        python tickets/process_tickets.py --output data/${today}.jsonl || true
        echo "crawl_date=$today" >> $GITHUB_OUTPUT

    - name: Crawl arXiv papers
      id: crawl_step
      run: |
        source .venv/bin/activate
        today=${{ steps.tickets_step.outputs.crawl_date }}

        cd daily_arxiv
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export TOKEN_GITHUB=${{ secrets.TOKEN_GITHUB }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export CATEGORIES="${{ vars.CATEGORIES }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"

        scrapy crawl arxiv -o ../data/${today}.jsonl

        if [ ! -f "../data/${today}.jsonl" ]; then
          echo "Crawling failed, no data file generated"
          exit 1
        fi

        echo "crawl_date=$today" >> $GITHUB_OUTPUT

    - name: Check for duplicates
      id: dedup_check
      run: |
        source .venv/bin/activate
        cd daily_arxiv
        set +e
        python daily_arxiv/check_stats.py
        dedup_exit_code=$?
        set -e

        case $dedup_exit_code in
          0)
            echo "has_new_content=true"  >> $GITHUB_OUTPUT
            ;;
          1)
            echo "has_new_content=false" >> $GITHUB_OUTPUT
            echo "skip_reason=no_new_content" >> $GITHUB_OUTPUT
            ;;
          2)
            echo "has_new_content=false" >> $GITHUB_OUTPUT
            echo "skip_reason=processing_error" >> $GITHUB_OUTPUT
            exit 1
            ;;
          *)
            echo "has_new_content=false" >> $GITHUB_OUTPUT
            echo "skip_reason=unknown_error" >> $GITHUB_OUTPUT
            exit 1
            ;;
        esac

    - name: AI Enhancement Processing
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}

        cd ai
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export LANGUAGE="${{ vars.LANGUAGE }}"
        export MODEL_NAME="${{ vars.MODEL_NAME }}"

        python enhance.py --data ../data/${today}.jsonl

    - name: Convert to Markdown
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        source .venv/bin/activate
        today=${{ steps.crawl_step.outputs.crawl_date }}
        export LANGUAGE="${{ vars.LANGUAGE }}"

        cd to_md
        AI_FILE="../data/${today}_AI_enhanced_${LANGUAGE}.jsonl"

        if [ ! -f "$AI_FILE" ]; then
          echo "AI enhanced file not found: $AI_FILE"
          exit 1
        fi
        python convert.py --data "$AI_FILE"

    - name: Update file list
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        mkdir -p assets
        ls data/*.jsonl | sed 's|data/||' > assets/file-list.txt

    - name: Publish data files to data branch
      if: steps.dedup_check.outputs.has_new_content == 'true'
      run: |
        git config user.email "${{ vars.EMAIL }}"
        git config user.name  "${{ vars.NAME }}"
        today=${{ steps.crawl_step.outputs.crawl_date }}

        mkdir -p /tmp/data_snapshot/data /tmp/data_snapshot/assets
        cp -r data/* /tmp/data_snapshot/data/ 2>/dev/null || true
        cp assets/file-list.txt /tmp/data_snapshot/assets/ 2>/dev/null || true

        rm -rf data/*.jsonl data/*.md assets/file-list.txt 2>/dev/null || true

        if git ls-remote --heads origin data | grep -q data; then
          git fetch origin data:data
          git checkout data
          git pull origin data || true
        else
          git checkout --orphan data
          git rm -rf --cached . 2>/dev/null || true
          mkdir -p data assets
          echo "# Data Branch" > README.md
          git add README.md
          git commit -m "chore: initialize data branch"
          git push origin data
        fi

        mkdir -p data assets
        cp -r /tmp/data_snapshot/data/* data/   2>/dev/null || true
        cp /tmp/data_snapshot/assets/file-list.txt assets/ 2>/dev/null || true

        git add data/* assets/file-list.txt 2>/dev/null || true

        if git diff --staged --quiet; then
          echo "No data changes to commit"
        else
          git commit -m "update: $today papers"
        fi

        git config pull.rebase true
        git config rebase.autoStash true
        for i in {1..3}; do
          git push origin data && break || { git pull origin data --no-edit || true; [ $i -eq 3 ] && exit 1; }
        done

    - name: Summary
      run: |
        if [ "${{ steps.dedup_check.outputs.has_new_content }}" = "true" ]; then
          echo "Workflow completed: new content found and processed"
        else
          echo "Workflow completed: skipped (${{ steps.dedup_check.outputs.skip_reason }})"
        fi
