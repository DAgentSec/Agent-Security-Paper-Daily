<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Agent Security Paper Daily — curated arXiv and conference papers on Agent Security">
    <title>Agent Security Paper Daily</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="shortcut icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data-config.js"></script>
    <script>Auth.requireAuth();</script>
    <style>
        .logo-image { height: 36px; width: auto; object-fit: contain; }
        .source-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .source-tag.arxiv {
            background: #e8f0fe;
            color: #1a56db;
        }
        .source-tag.conference {
            background: #fdf4ff;
            color: #7e22ce;
        }
        .catalog-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff !important;
            font-weight: 600;
        }
        .venue-track-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            background: #fef3c7;
            color: #92400e;
            margin-left: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <a href="https://github.com/PLACEHOLDER_REPO_OWNER/PLACEHOLDER_REPO_NAME" target="_blank" class="github-button">
                        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                        </svg>
                        <span class="github-text">GitHub</span>
                    </a>
                </div>

                <div class="header-center">
                    <a href="index.html" class="site-logo">
                        <img src="assets/logo.png" alt="Agent Security Paper Daily Logo" class="logo-image">
                        <span class="site-title">Agent Security Paper Daily</span>
                    </a>
                </div>

                <div class="header-controls">
                    <div class="date-selector">
                        <div class="date-display">
                            <span id="currentDate">Loading...</span>
                            <button id="calendarButton" class="icon-button">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M19 4H18V2H16V4H8V2H6V4H5C3.89 4 3.01 4.9 3.01 6L3 20C3 21.1 3.89 22 5 22H19C20.1 22 21 21.1 21 20V6C21 4.9 20.1 4 19 4ZM19 20H5V9H19V20ZM7 11H12V16H7V11Z" fill="currentColor"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button id="logoutButton" onclick="Auth.logout()" class="icon-button" title="Logout" style="border:none;background:transparent;cursor:pointer;color:#e74c3c;display:none;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 7L15.59 8.41L18.17 11H8V13H18.17L15.59 15.59L17 17L22 12L17 7ZM4 5H12V3H4C2.9 3 2 3.9 2 5V19C2 20.1 2.9 21 4 21H12V19H4V5Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="category-nav">
                <div class="category-label-container">
                    <span class="category-nav-label">Catalog</span>
                    <div class="category-scroll">
                        <button class="category-button active" data-category="all">All</button>
                    </div>
                </div>
                <div class="filter-label-container">
                    <span class="filter-nav-label">Filter</span>
                    <div id="textSearchContainer" class="text-search">
                        <button id="textSearchToggle" class="icon-button" title="Search">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M10.5 3a7.5 7.5 0 105.07 13.07l3.68 3.68a1 1 0 001.41-1.41l-3.68-3.68A7.5 7.5 0 0010.5 3zm0 2a5.5 5.5 0 110 11 5.5 5.5 0 010-11z" fill="currentColor"/>
                            </svg>
                        </button>
                        <div class="search-input-wrapper" style="display:none;">
                            <input id="textSearchInput" type="text" placeholder="Type to search..." aria-label="Search">
                            <button id="textSearchClear" class="clear-x" title="Clear" style="display:none;">×</button>
                        </div>
                    </div>
                    <div class="filter-scroll" id="filterTags"></div>
                </div>
            </div>
        </header>

        <main>
            <div class="date-picker-modal" id="datePickerModal">
                <div class="date-picker-content">
                    <div class="date-picker-body">
                        <h3 class="date-picker-title">Select Date</h3>
                        <div class="flatpickr-container">
                            <input type="text" id="datepicker" placeholder="Select Date" data-input>
                        </div>
                        <div class="date-range-selector">
                            <span class="toggle-label">Range</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="dateRangeMode">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="paper-container" id="paperContainer">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>Loading papers...</p>
                </div>
            </div>
        </main>

        <div class="paper-modal" id="paperModal">
            <div class="paper-modal-content">
                <div class="paper-modal-header">
                    <h2 id="modalTitle">Details</h2>
                    <button id="closeModal" class="icon-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
                <div class="paper-modal-body" id="modalBody"></div>
                <div class="paper-modal-footer">
                    <div class="paper-navigation">
                        <span class="navigation-hint">← → to navigate • space for random</span>
                        <span id="paperPosition" class="paper-position">-</span>
                    </div>
                    <div class="paper-modal-buttons">
                        <a id="kimiChatLink" href="#" target="_blank" class="button icon-button" title="Open in KimiChat">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <text x="4" y="17" fill="#a42c25" font-family="Arial" font-weight="bold" font-size="14">AI</text>
                            </svg>
                        </a>
                        <a id="pdfLink" href="#" target="_blank" class="button icon-button" title="Open PDF">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M20 2H8C6.9 2 6 2.9 6 4V16C6 17.1 6.9 18 8 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H8V4H20V16ZM4 6H2V20C2 21.1 2.9 22 4 22H18V20H4V6ZM16 12V9C16 8.45 15.55 8 15 8H13V13H15C15.55 13 16 12.55 16 12ZM14 9H15V12H14V9ZM18 11H19V10H18V9H19V8H17V13H18V11ZM10 11H11C11.55 11 12 10.55 12 10V9C12 8.45 11.55 8 11 8H9V13H10V11ZM10 9H11V10H10V9Z" fill="#a42c25"/>
                            </svg>
                        </a>
                        <a id="htmlLink" href="#" target="_blank" class="button icon-button" title="Open HTML">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M7 17L3 12L7 7M17 17L21 12L17 7M14 5L10 19" stroke="#a42c25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>
                        <a id="githubLink" href="#" target="_blank" class="button icon-button" title="View Code" style="display:none;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill="#a42c25"/>
                            </svg>
                        </a>
                        <a id="paperLink" href="#" target="_blank" class="button icon-button primary" title="Open in arXiv">
                            <svg width="24" height="24" viewBox="0 0 246.978 110.119" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M134.811 46.23l24.36-29.89c1.492-1.989 2.2-3.03 1.492-4.723a5.142 5.142 0 0 0-4.481-3.161h0a4.024 4.024 0 0 0-3.008 1.108L127.035 37.824zM168.108 102.071l-32.363-38.283-.972 1.033-7.789-9.214-7.743-9.357-4.695 5.076a4.769 4.769 0 0 0 .015 6.53l47.786 51.074a3.913 3.913 0 0 0 3.137 1.192 4.394 4.394 0 0 0 4.027-2.818c.724-1.73-.076-3.441-1.403-5.233zM121.05 64.817l6.052 6.485-26.553 28.128a2.98 2.98 0 0 1-2.275 1.194 3.449 3.449 0 0 1-3.241-2.144c-.513-1.231.166-3.15 1.122-4.168l.023-.024.021-.026 24.851-29.448m-.047-1.882l-25.76 30.524c-1.286 1.372-2.084 3.777-1.365 5.5a4.705 4.705 0 0 0 4.4 2.914 4.191 4.191 0 0 0 3.161-1.563l27.382-29.007-7.814-8.372zM69.406 31.884c1.859 0 3.1 1.24 3.985 3.453 1.062-2.213 2.568-3.453 4.694-3.453h14.878a4.062 4.062 0 0 1 4.074 4.074v7.828c0 2.656-1.327 4.074-4.074 4.074-2.656 0-4.074-1.418-4.074-4.074V40.03H78.35a2.411 2.411 0 0 0-2.656 2.745v27.188h10.007c2.658 0 4.074 1.329 4.074 4.074s-1.416 4.074-4.074 4.074H59.311c-2.659 0-3.986-1.328-3.986-4.074s1.327-4.074 3.986-4.074h8.236V40.03h-7.263c-2.656 0-3.985-1.329-3.985-4.074 0-2.658 1.329-4.074 3.985-4.074zM181.068 31.884c2.656 0 4.074 1.416 4.074 4.074v34.007h10.1c2.746 0 4.074 1.329 4.074 4.074s-1.328 4.074-4.074 4.074h-28.607c-2.656 0-4.074-1.328-4.074-4.074s1.418-4.074 4.074-4.074h10.362V40.03h-8.533c-2.744 0-4.073-1.329-4.073-4.074 0-2.658 1.329-4.074 4.073-4.074zm4.22-17.615a5.859 5.859 0 1 1-5.819-5.819 5.9 5.9 0 0 1 5.819 5.819z" fill="#a42c25"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2025 Agent Security Paper Daily | Content generated by AI — verify carefully. |
               <a href="https://github.com/PLACEHOLDER_REPO_OWNER/PLACEHOLDER_REPO_NAME" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <button id="backToTop" class="back-to-top" title="Back to top">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 14L12 9L17 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton && Auth.isPasswordEnabled()) logoutButton.style.display = '';
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>
