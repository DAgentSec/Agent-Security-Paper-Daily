<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Verification - Agent Security Paper Daily</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        h1 {
            margin: 0 0 8px;
            color: #333;
            text-align: center;
            font-size: 22px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 28px;
            font-size: 14px;
        }
        .input-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        button[type="submit"]:hover { opacity: 0.9; }
        button[type="submit"]:active { transform: translateY(1px); }
        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
            padding: 10px;
            background: #fee;
            border-radius: 6px;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .remember-me {
            margin: 14px 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .remember-me input[type="checkbox"] { cursor: pointer; }
        .remember-me label { margin: 0; font-weight: normal; cursor: pointer; }
        .site-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-bottom: 28px;
            gap: 10px;
        }
        .site-logo:hover { opacity: 0.88; }
        .logo-image { height: 36px; width: auto; }
        .site-title {
            font-size: 17px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="site-logo">
            <img src="assets/logo.png" alt="Agent Security Paper Daily" class="logo-image">
            <span class="site-title">Agent Security Paper Daily</span>
        </a>
        <h1>Access Verification</h1>
        <div class="subtitle">Please enter the password to continue</div>
        <form id="loginForm">
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter password" required autofocus
                       autocomplete="current-password">
            </div>
            <div class="remember-me">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Remember me for 7 days</label>
            </div>
            <button type="submit">Verify Access</button>
            <div class="error-message" id="errorMessage">
                Invalid password. Please try again.
            </div>
        </form>
        <div class="footer">Agent Security Paper Daily</div>
    </div>

    <script src="js/auth-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (Auth.isAuthenticated()) {
            const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
            window.location.href = redirect;
        }

        document.getElementById('loginForm').addEventListener('submit', async e => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('errorMessage');

            if (await Auth.login(password, remember)) {
                const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                window.location.href = redirect;
            } else {
                errorEl.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
            }
        });
    </script>
</body>
</html>
